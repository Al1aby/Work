name: Fetch Calendars

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests icalendar python-dateutil

      - name: Check secrets
        run: |
          echo "OUTLOOK_CALENDAR_URL set: ${{ secrets.OUTLOOK_CALENDAR_URL != '' }}"
          echo "ICLOUD_CALENDAR_URL set:  ${{ secrets.ICLOUD_CALENDAR_URL != '' }}"

      - name: Fetch calendar and write events.json
        env:
          OUTLOOK_CALENDAR_URL: ${{ secrets.OUTLOOK_CALENDAR_URL }}
          ICLOUD_CALENDAR_URL: ${{ secrets.ICLOUD_CALENDAR_URL }}
        run: python fetch_calendar.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git diff --cached --quiet || git commit -m "chore: update events.json [skip ci]"
          git push
